<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="logo.png" type="image/png" />
  <title>Contributors — ScamSentry</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff;
      --text: #111;
      --text-muted: #444;
      --text-muted-2: #555;
      --text-muted-4: #888;
      --border: #ddd;
      --border-2: #ccc;
      --surface: #f7f7f7;
      --avatar-border: #fff;
      --shadow: rgba(0,0,0,0.08);
    }

    [data-theme="dark"] {
      --bg: #1a1a1a;
      --text: #f0f0f0;
      --text-muted: #c0c0c0;
      --text-muted-2: #b0b0b0;
      --text-muted-4: #888;
      --border: #333;
      --border-2: #444;
      --surface: #252525;
      --avatar-border: #252525;
      --shadow: rgba(0,0,0,0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .back-link {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .back-link:hover {
      color: var(--text);
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .theme-toggle:hover { transform: scale(1.05); }
    .theme-toggle img { width: 22px; height: 22px; }
    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }
    [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
    [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
    [data-theme="dark"] .theme-toggle img { filter: invert(1); }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding-top: 80px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 32px;
      text-align: center;
    }

    .contributor-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .contributor {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 8px;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .contributor img {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--avatar-border);
      box-shadow: 0 1px 3px var(--shadow);
      flex-shrink: 0;
    }

    .contributor-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .contributor-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <header class="top-bar">
    <a href="index.html" class="back-link">← Back</a>
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
      <img class="icon-moon" src="moon.svg" alt="" width="22" height="22" />
      <img class="icon-sun" src="sun.svg" alt="" width="22" height="22" />
    </button>
  </header>

  <main class="page">
    <h1>Contributors</h1>
    <div class="contributor-list">
      <div class="contributor">
        <img src="uncopy.webp" alt="" />
        <div>
          <div class="contributor-name">Uncopy</div>
          <div class="contributor-desc">Made the video at the top of the site</div>
        </div>
      </div>
      <div class="contributor">
        <img src="solace.webp" alt="" />
        <div>
          <div class="contributor-name">Solace</div>
          <div class="contributor-desc">Made the basic version of site</div>
        </div>
      </div>
      <div class="contributor">
        <img src="toilet.webp" alt="" />
        <div>
          <div class="contributor-name">Toilet</div>
          <div class="contributor-desc">Paid for domain (hacked.watch)</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var KEY = 'scamsentry-theme';
      var root = document.documentElement;
      function getTheme() {
        try { return localStorage.getItem(KEY); } catch (e) { return null; }
      }
      function setTheme(theme) {
        try { localStorage.setItem(KEY, theme); } catch (e) {}
        root.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
      }
      var saved = getTheme();
      if (saved === 'dark' || saved === 'light') {
        setTheme(saved);
      } else {
        root.setAttribute('data-theme', 'dark');
      }
      document.getElementById('theme-toggle').addEventListener('click', function () {
        var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        setTheme(next);
      });
    })();
  </script>
</body>
</html>
